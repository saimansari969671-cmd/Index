<!DOCTYPE html>
<html>
<head>
<title>Valentine</title>

<style>

body{
text-align:center;
background:pink;
font-family:sans-serif;
margin-top:150px;
overflow:hidden;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#yes{
background:red;
color:white;
}

#no{
background:black;
color:white;
position:absolute;
}

#msg{
font-size:32px;
color:red;
margin-top:30px;
font-weight:bold;
}

</style>
</head>

<body>
<meta charset="UTF-8">
<h1>Bestfriend ❤️</h1>
<h2>Me bahut achha hu na? 🫣</h2>

<button id="yes">Yes 🙃</button>
<button id="no">No 😁</button>

<h2 id="msg"></h2>

<script>

let noBtn = document.getElementById("no");
let msg = document.getElementById("msg");
let count = 0;

noBtn.addEventListener("click", function(){

count++;

if(count==1){
msg.innerHTML = "Soch lo 🤔";
}
else if(count==2){
msg.innerHTML = "Arey fir se No 😏";
}
else if(count>=3){
msg.innerHTML = "Maar khana hai kya 😡";
}

let x = Math.random() * window.innerWidth;
let y = Math.random() * window.innerHeight;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});

document.getElementById("yes").onclick = function(){
msg.innerHTML = "Mujhe pata hi tha me bahut achha hu";
};

</script>

</body>
</html>
